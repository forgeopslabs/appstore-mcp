name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --locked --verbose
      - name: Test
        run: cargo test --locked --verbose
      - name: Smoke test (tools/list over stdio, no credentials)
        shell: bash
        run: |
          BIN="target/debug/appstore-mcp"
          [ "${{ matrix.os }}" = "windows-latest" ] && BIN="target/debug/appstore-mcp.exe"
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' > rpc.jsonl
          ( cat rpc.jsonl; sleep 2 ) | "$BIN" > out.jsonl || true
          python3 - <<'PY'
          import json
          n = 0
          for line in open('out.jsonl'):
              line = line.strip()
              if not line:
                  continue
              try:
                  obj = json.loads(line)
              except Exception:
                  continue
              if obj.get('id') == 2:
                  n = len(obj['result']['tools'])
          print('tools served:', n)
          assert n == 101, f'expected 101 tools, got {n}'
          PY

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
